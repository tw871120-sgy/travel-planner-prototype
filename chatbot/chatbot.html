<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RAG Memory Chatbot</title>
    <link rel="stylesheet" href="./chatbot.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" aria-label="設定與知識庫">
        <section class="brand-block">
          <p class="eyebrow">AI Chatbot</p>
          <h1>記憶型 RAG 聊天助理</h1>
          <div class="status-row">
            <span id="api-status" class="status-dot idle"></span>
            <span id="status-text">尚未連線</span>
          </div>
        </section>

        <section class="panel settings-panel">
          <div class="panel-title">
            <h2>API</h2>
            <button id="save-settings" type="button" class="icon-button" title="儲存設定" aria-label="儲存設定">✓</button>
          </div>
          <label>
            <span>Endpoint</span>
            <input id="api-endpoint" type="url" placeholder="https://api.openai.com/v1/chat/completions" autocomplete="off" />
          </label>
          <label>
            <span>Model</span>
            <input id="api-model" type="text" placeholder="gpt-4o-mini" autocomplete="off" />
          </label>
          <label>
            <span>API Key</span>
            <input id="api-key" type="password" placeholder="sk-..." autocomplete="off" />
          </label>
          <div class="setting-grid">
            <label>
              <span>Temperature</span>
              <input id="temperature" type="number" min="0" max="2" step="0.1" value="0.4" />
            </label>
            <label>
              <span>RAG 筆數</span>
              <input id="rag-topk" type="number" min="1" max="8" step="1" value="4" />
            </label>
          </div>
        </section>

        <section class="panel memory-panel">
          <div class="panel-title">
            <h2>記憶</h2>
            <button id="clear-memory" type="button" class="secondary small">清空</button>
          </div>
          <label class="switch-row">
            <input id="memory-enabled" type="checkbox" checked />
            <span>帶入長期記憶</span>
          </label>
          <form id="memory-form" class="inline-form">
            <input id="memory-input" type="text" placeholder="新增一筆偏好、身份或規則" />
            <button type="submit" class="small">加入</button>
          </form>
          <div id="memory-list" class="pill-list empty"></div>
        </section>

        <section class="panel rag-panel">
          <div class="panel-title">
            <h2>RAG 知識庫</h2>
            <button id="clear-knowledge" type="button" class="secondary small">清空</button>
          </div>
          <input id="file-input" class="file-input" type="file" accept=".txt,.md,.json,.csv" multiple />
          <label for="file-input" class="file-drop">選擇文件</label>
          <textarea id="knowledge-text" rows="5" placeholder="貼上 FAQ、產品資料、規格文件或內部筆記"></textarea>
          <button id="add-knowledge" type="button">加入知識庫</button>
          <div id="knowledge-list" class="doc-list empty"></div>
        </section>
      </aside>

      <section class="chat-area" aria-label="聊天區">
        <header class="chat-header">
          <div>
            <h2>Chat</h2>
            <p id="chat-subtitle">記憶與知識庫會自動併入下一次回覆。</p>
          </div>
          <div class="header-actions">
            <button id="export-chat" type="button" class="secondary">匯出</button>
            <button id="clear-chat" type="button" class="secondary">新對話</button>
          </div>
        </header>

        <div id="messages" class="messages" aria-live="polite"></div>
        <div id="sources-bar" class="sources-bar empty"></div>

        <form id="chat-form" class="composer">
          <textarea id="message-input" rows="1" placeholder="輸入訊息，Shift + Enter 換行"></textarea>
          <button id="send-button" type="submit" aria-label="送出訊息">送出</button>
        </form>
      </section>
    </main>

    <script src="./chatbot.js"></script>
  </body>
</html>
